name: دانلود، تقسیم و آپلود خودکار فایل بزرگ (Google Drive با gdown)

on:
  workflow_dispatch:
    inputs:
      file_url_or_id:
        description: 'لینک کامل یا شناسه (ID) فایل در گوگل درایو'
        required: true
        default: 'https://drive.google.com/file/d/1iph61BI_iCiM_cTXfzDc98ktcngkspb1/view?usp=sharing'
        type: string
      part_size:
        description: 'اندازه هر قطعه (مثلاً 95M برای فایل ۶ گیگابایتی)'
        required: false
        default: '95M'
        type: string

jobs:
  process-large-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: آماده‌سازی محیط و نصب gdown
        run: |
          echo "شروع کار – نصب gdown"
          pip install gdown

      - name: دریافت فایل از گوگل درایو با gdown
        run: |
          echo "دانلود از: ${{ github.event.inputs.file_url_or_id }}"
          # gdown به طور خودکار لینک کامل یا شناسه را تشخیص می‌دهد
          gdown --fuzzy "${{ github.event.inputs.file_url_or_id }}" -O "original_file.bin" --continue
          echo "دانلود تمام شد"
          ls -lh original_file.bin

      - name: تقسیم فایل به قطعات
        run: |
          echo "تقسیم فایل به قطعات ${{ github.event.inputs.part_size }}"
          split -b ${{ github.event.inputs.part_size }} original_file.bin "part_"
          echo "تقسیم انجام شد – تعداد قطعات: $(ls part_* | wc -l)"
          ls -lh part_*

      - name: ایجاد Release جدید
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "upload-${{ github.run_id }}"
          name: "آپلود خودکار - ${{ github.run_id }}"
          body: |
            ### قطعات فایل بزرگ
            
            **لینک یا شناسه منبع:** `${{ github.event.inputs.file_url_or_id }}`
            **اندازه هر قطعه:** ${{ github.event.inputs.part_size }}
            
            **نحوه ترکیب قطعات (در ترمینال):**
            ```bash
            cat part_* > فایل_نهایی.zip
