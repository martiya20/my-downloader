name: دانلود، تقسیم و آپلود خودکار فایل بزرگ (Google Drive با gdown)

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'شناسه (ID) یا لینک کامل فایل در Google Drive'
        required: true
        default: '1iph61BI_iCiM_cTXfzDc98ktcngkspb1'
        type: string
      part_size:
        description: 'اندازه هر قطعه (مثلاً 95M برای فایل ۶ گیگابایتی)'
        required: false
        default: '95M'
        type: string

jobs:
  process-large-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: آماده‌سازی محیط و نصب آخرین نسخه gdown
        run: |
          echo "🔄 به‌روزرسانی pip و نصب آخرین نسخه gdown..."
          python -m pip install --upgrade pip
          pip install --upgrade gdown

      - name: دریافت فایل از Google Drive با gdown
        run: |
          echo "🎯 شروع دانلود فایل..."
          # از --fuzzy برای استخراج خودکار ID از لینک استفاده می‌کنیم
          gdown --fuzzy "${{ github.event.inputs.file_id }}" -O "original_file.bin" --continue
          echo "✅ دانلود با موفقیت انجام شد. حجم فایل:"
          ls -lh original_file.bin

      - name: تقسیم فایل به قطعات
        run: |
          echo "✂️ تقسیم فایل به قطعات ${{ github.event.inputs.part_size }}..."
          split -b ${{ github.event.inputs.part_size }} original_file.bin "part_"
          echo "✅ تقسیم انجام شد. تعداد قطعات ایجاد شده: $(ls part_* | wc -l)"
          ls -lh part_*

      - name: ایجاد Release جدید
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "upload-${{ github.run_id }}"
          name: "آپلود خودکار - ${{ github.run_id }}"
          body: |
            ### 🎉 قطعات فایل بزرگ با موفقیت آپلود شد!

            - **شناسه یا لینک منبع:** `${{ github.event.inputs.file_id }}`
            - **اندازه هر قطعه:** ${{ github.event.inputs.part_size }}

            **نحوه ترکیب قطعات و بازسازی فایل اصلی:**
            ```bash
            cat part_* > فایل_نهایی.zip
