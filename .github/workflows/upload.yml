name: 🚀 دانلود و آپلود حرفه‌ای فایل بزرگ

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: '🔗 لینک گوگل درایو یا File ID'
        required: true
        default: '1iph61BI_iCiM_cTXfzDc98ktcngkspb1'
        type: string
      part_size:
        description: '📦 اندازه هر قطعه (مثلا: 95M, 100M)'
        required: false
        default: '95M'
        type: string

jobs:
  download-split-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🧰 نصب ابزارهای ضروری و به‌روز
        run: |
          # نصب gdown با آخرین نسخه و یک اسکریپت قوی دانلود
          pip install --upgrade gdown

      - name: 🧠 استخراج File ID از لینک
        id: extract-id
        run: |
          INPUT="${{ github.event.inputs.file_id }}"
          if [[ "$INPUT" =~ /file/d/([a-zA-Z0-9_-]+) ]]; then
            FILE_ID="${BASH_REMATCH[1]}"
          elif [[ "$INPUT" =~ id=([a-zA-Z0-9_-]+) ]]; then
            FILE_ID="${BASH_REMATCH[1]}"
          elif [[ "$INPUT" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            FILE_ID="$INPUT"
          else
            echo "❌ فرمت ورودی نامعتبر است."
            exit 1
          fi
          echo "FILE_ID=$FILE_ID" >> $GITHUB_OUTPUT
          echo "✅ File ID استخراج شد: $FILE_ID"

      - name: 🌟 دانلود هوشمند فایل (روش ترکیبی)
        run: |
          FILE_ID="${{ steps.extract-id.outputs.FILE_ID }}"
          echo "🎯 شروع دانلود با روش پیشرفته..."
          
          # دانلود به روش curl و gdown ترکیبی برای اطمینان بالا
          if gdown "https://drive.google.com/uc?id=${FILE_ID}" -O "original_file.bin" --fuzzy --no-check-certificate --continue; then
            echo "✅ دانلود با gdown انجام شد."
          else
            echo "⚠️ gdown با مشکل مواجه شد، تلاش با روش مرحله‌ای..."
            # روش پیشرفته داینامیک token به صورت مرحله‌ای
            COOKIE_FILE="/tmp/gdrive_cookies.txt"
            # دریافت صفحه اولیه برای گرفتن token
            curl -c "$COOKIE_FILE" -s -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" > /tmp/intermediate.html
            # استخراج confirm token
            CONFIRM=$(grep -o 'confirm=[^&]*' /tmp/intermediate.html | head -1 | cut -d '=' -f2)
            if [ -n "$CONFIRM" ]; then
              echo "✅ token استخراج شد: $CONFIRM"
              curl -Lb "$COOKIE_FILE" "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}" -o "original_file.bin"
            else
              # در صورت عدم موفقیت، روش مستقیم
              echo "⚠️ token یافت نشد، دانلود مستقیم..."
              curl -L "https://drive.google.com/uc?export=download&id=${FILE_ID}" -o "original_file.bin" \
                -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
            fi
          fi

      - name: 🔪 بررسی و تقسیم فایل به قطعات
        run: |
          if [ ! -f "original_file.bin" ] || [ $(stat -c%s "original_file.bin") -lt 1000000 ]; then
            echo "❌ خطا: فایل دانلود نشد یا حجم آن بسیار کم است."
            exit 1
          fi
          echo "✂️ تقسیم فایل (حجم واقعی: $(du -h original_file.bin | cut -f1))"
          split -b ${{ github.event.inputs.part_size }} -d -a 3 original_file.bin "part_"
          echo "✅ تعداد قطعات ایجاد شده: $(ls part_* | wc -l)"

      - name: ☁️ آپلود قطعات به GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "upload-auto-${{ github.run_id }}"
          name: "📂 دانلود خودکار - ${{ github.run_id }}"
          body: |
            ### 📁 فایل آپلود شده به روش خودکار
            - **منبع:** Google Drive
            - **اندازه هر قطعه:** ${{ github.event.inputs.part_size }}
            - **تاریخ آپلود:** $(date)
            - **نحوه بازیابی فایل اصلی:** تمام قطعات `part_*` را دانلود کرده و با دستور `cat part_* > file.zip` ترکیب کنید.
          files: part_*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
