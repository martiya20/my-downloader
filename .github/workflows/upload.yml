name: دانلود، تقسیم و آپلود خودکار فایل بزرگ

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم (یا لینک گوگل درایو)'
        required: true
        default: 'https://drive.usercontent.google.com/download?id=1iph61BI_iCiM_cTXfzDc98ktcngkspb1&export=download'
        type: string
      part_size:
        description: 'اندازه هر قطعه (مثلا 90M یا 100M)'
        required: false
        default: '90M'
        type: string

jobs:
  process-large-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: آماده‌سازی محیط
        run: |
          echo "شروع کار"
          df -h .
          echo "نصب ابزارهای لازم..."
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install --upgrade gdown

      - name: تشخیص نوع لینک و دانلود فایل
        id: download
        run: |
          URL="${{ github.event.inputs.file_url }}"
          echo "لینک وارد شده: $URL"
          
          # بررسی لینک گوگل درایو
          if [[ "$URL" == *"drive.google.com"* ]] || [[ "$URL" == *"drive.usercontent.google.com"* ]] || [[ "$URL" == *"docs.google.com"* ]]; then
            echo "🔍 شناسایی لینک گوگل درایو – استفاده از gdown"
            # استخراج FILE_ID از لینک
            if [[ "$URL" == *"id="* ]]; then
              FILE_ID=$(echo "$URL" | grep -oP '(?<=id=)[^&]+')
            else
              echo "❌ نمی‌توانم FILE_ID را از لینک گوگل استخراج کنم. لطفاً لینک استاندارد drive.google.com/file/d/... را وارد کنید."
              exit 1
            fi
            echo "FILE_ID: $FILE_ID"
            gdown "https://drive.google.com/uc?id=$FILE_ID" -O "original_file.bin" --fuzzy
            if [ $? -ne 0 ]; then
              echo "❌ دانلود با gdown شکست خورد. شاید فایل عمومی نیست یا محدودیت دانلود دارد."
              exit 1
            fi
          else
            echo "🌐 لینک مستقیم معمولی – استفاده از curl با هدرهای شبیه مرورگر"
            curl -L -o "original_file.bin" "$URL" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -H "Referer: https://www.google.com/" \
              -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
              -H "Accept-Language: en-US,en;q=0.5" \
              --retry 5 \
              --retry-delay 3 \
              --max-time 1800
            if [ $? -ne 0 ]; then
              echo "❌ دانلود با curl شکست خورد. لطفاً لینک را بررسی کنید."
              exit 1
            fi
          fi
          
          echo "✅ دانلود انجام شد. حجم فایل:"
          ls -lh original_file.bin

      - name: تقسیم فایل به قطعات
        run: |
          echo "✂️ تقسیم فایل به قطعات ${{ github.event.inputs.part_size }}"
          split -b ${{ github.event.inputs.part_size }} original_file.bin "part_"
          echo "✅ تقسیم انجام شد. تعداد قطعات:"
          ls -lh part_* | wc -l
          ls -lh part_*

      - name: ایجاد Release جدید
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "upload-${{ github.run_id }}"
          name: "آپلود خودکار - ${{ github.run_id }}"
          body: |
            ### قطعات فایل بزرگ
            - **لینک اصلی:** `${{ github.event.inputs.file_url }}`
            - **اندازه هر قطعه:** ${{ github.event.inputs.part_size }}
            - **تعداد قطعات:** (لیست زیر)
            
            **نحوه ترکیب:** تمام قطعات را دانلود کرده و در ترمینال (یا Command Prompt) بنویسید:
            ```bash
            cat part_* > فایل_نهایی.zip   # لینوکس/مک
            copy /b part_* فایل_نهایی.zip  # ویندوز
