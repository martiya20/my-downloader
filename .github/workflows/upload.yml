name: "دانلود، تقسیم و آپلود خودکار فایل از گوگل درایو (Service Account)"

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'شناسه فایل در گوگل درایو (مثل 1iph61BI_iCiM_cTXfzDc98ktcngkspb1)'
        required: true
      part_size:
        description: 'اندازه هر قطعه (پیش‌فرض 95M)'
        required: false
        default: '95M'

jobs:
  process-large-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: نصب کتابخانه گوگل
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: دانلود فایل با استفاده از Service Account
        env:
          GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS_JSON }}
        run: |
          # ساخت فایل credentials.json از Secret
          echo "$GDRIVE_CREDENTIALS_JSON" > credentials.json
          # اسکریپت پایتون برای دانلود
          python3 - <<EOF
          import io
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaIoBaseDownload
          from google.oauth2 import service_account

          SCOPES = ['https://www.googleapis.com/auth/drive.readonly']
          credentials = service_account.Credentials.from_service_account_file(
              'credentials.json', scopes=SCOPES)
          service = build('drive', 'v3', credentials=credentials)

          file_id = '${{ github.event.inputs.file_id }}'
          print(f"در حال دانلود فایل با شناسه: {file_id}")
          request = service.files().get_media(fileId=file_id)
          fh = io.BytesIO()
          downloader = MediaIoBaseDownload(fh, request, chunksize=50 * 1024 * 1024)

          done = False
          while not done:
              status, done = downloader.next_chunk()
              if status:
                  print(f'\rپیشرفت: {int(status.progress() * 100)}%', end='')
          print("\nدانلود کامل شد.")

          with open("original_file.bin", "wb") as f:
              f.write(fh.getvalue())
          EOF

      - name: تقسیم فایل به قطعات
        run: split -b ${{ github.event.inputs.part_size }} -d -a 3 original_file.bin "part_"

      - name: آپلود قطعات به Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "upload-${{ github.run_id }}"
          name: "خروجی دانلود خودکار - ${{ github.run_id }}"
          files: part_*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
