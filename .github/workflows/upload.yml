name: دانلود، تقسیم و آپلود خودکار فایل بزرگ

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم (یا آیدی فایل گوگل درایو)'
        required: true
        default: '1iph61BI_iCiM_cTXfzDc98ktcngkspb1'
        type: string
      part_size:
        description: 'اندازه هر قطعه (مثلا 90M یا 100M)'
        required: false
        default: '90M'
        type: string

jobs:
  process-large-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: آماده‌سازی محیط
        run: |
          echo "شروع کار"
          df -h .

      - name: دریافت فایل (سازگار با لینک مستقیم و گوگل درایو)
        id: download
        run: |
          URL_OR_ID="${{ github.event.inputs.file_url }}"
          
          # تابع دانلود فایل با لینک مستقیم
          download_direct_url() {
            local url="$1"
            echo "🌐 لینک مستقیم معمولی – استفاده از curl..."
            curl -L -o "original_file.bin" "$url" \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -H "Referer: https://www.google.com/" \
              --retry 5 --retry-delay 3 --max-time 1800
          }
          
          # تابع دانلود فایل از گوگل درایو
          download_google_drive() {
            local file_id="$1"
            echo "🔍 شناسایی لینک گوگل درایو"
            echo "FILE_ID: $file_id"
            
            # مرحله 1: دریافت کوکی و confirm token
            echo "مرحله 1: دریافت کوکی و token تأیید..."
            curl -sc /tmp/gdrive_cookie "https://drive.google.com/uc?export=download&id=${file_id}" > /tmp/intermediate.html
            
            # استخراج confirm token از صفحه هشدار
            CONFIRM=$(grep -o 'confirm=[^&]*' /tmp/intermediate.html | head -1 | cut -d '=' -f2)
            
            if [ -z "$CONFIRM" ]; then
              echo "⚠️ صفحه هشدار پیدا نشد. شاید فایل کوچک است و مستقیم دانلود می‌شود."
              # اگر confirm پیدا نشد، سعی می‌کنیم مستقیم دانلود کنیم
              curl -Lb /tmp/gdrive_cookie "https://drive.google.com/uc?export=download&id=${file_id}" -o "original_file.bin"
            else
              echo "✅ confirm token دریافت شد: $CONFIRM"
              # مرحله 2: دانلود واقعی فایل با استفاده از confirm token
              echo "مرحله 2: شروع دانلود فایل اصلی..."
              curl -Lb /tmp/gdrive_cookie "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${file_id}" -o "original_file.bin"
            fi
          }
          
          # تشخیص نوع لینک
          if [[ "$URL_OR_ID" == "https://"* ]] || [[ "$URL_OR_ID" == "http://"* ]]; then
            if [[ "$URL_OR_ID" == *"drive.google.com"* ]] || [[ "$URL_OR_ID" == *"drive.usercontent.google.com"* ]]; then
              # استخراج FILE_ID از لینک گوگل
              if [[ "$URL_OR_ID" == *"/file/d/"* ]]; then
                FILE_ID=$(echo "$URL_OR_ID" | grep -oP '(?<=/file/d/)[^/]+')
              elif [[ "$URL_OR_ID" == *"id="* ]]; then
                FILE_ID=$(echo "$URL_OR_ID" | grep -oP '(?<=id=)[^&]+')
              else
                echo "❌ نمی‌توانم FILE_ID را از لینک گوگل استخراج کنم."
                exit 1
              fi
              download_google_drive "$FILE_ID"
            else
              download_direct_url "$URL_OR_ID"
            fi
          else
            # اگر ورودی مستقیم FILE_ID بود
            download_google_drive "$URL_OR_ID"
          fi
          
          # بررسی موفقیت دانلود
          if [ ! -f "original_file.bin" ] || [ $(stat -c%s "original_file.bin") -lt 1000000 ]; then
            echo "❌ دانلود ناموفق بود یا فایل خیلی کوچک است."
            exit 1
          fi
          
          echo "✅ دانلود انجام شد. حجم فایل:"
          ls -lh original_file.bin

      - name: تقسیم فایل به قطعات
        run: |
          echo "✂️ تقسیم فایل به قطعات ${{ github.event.inputs.part_size }}"
          split -b ${{ github.event.inputs.part_size }} original_file.bin "part_"
          echo "✅ تقسیم انجام شد. تعداد قطعات:"
          ls -lh part_* | wc -l
          ls -lh part_*

      - name: ایجاد Release جدید
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "upload-${{ github.run_id }}"
          name: "آپلود خودکار - ${{ github.run_id }}"
          body: |
            ### قطعات فایل بزرگ
            - **لینک اصلی:** `${{ github.event.inputs.file_url }}`
            - **اندازه هر قطعه:** ${{ github.event.inputs.part_size }}
            
            **نحوه ترکیب:**
            ```bash
            cat part_* > فایل_نهایی.zip   # لینوکس/مک
            copy /b part_* فایل_نهایی.zip  # ویندوز
